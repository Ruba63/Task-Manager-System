<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Team Task Management</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
</head>
<body>

<!-- ═══════════════════════ SIDEBAR ═══════════════════════ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <button class="nav-btn active" data-tip="Dashboard" onclick="setActiveNav(this)">
      <!-- grid icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    </button>
    <button class="nav-btn" data-tip="Members" onclick="setActiveNav(this)">
      <!-- users icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </button>
    <button class="nav-btn" data-tip="Messages" onclick="setActiveNav(this)">
      <!-- message icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>
    <button class="nav-btn" data-tip="Calendar" onclick="setActiveNav(this)">
      <!-- calendar icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </button>
    <button class="nav-btn" data-tip="Reports" onclick="setActiveNav(this)">
      <!-- file icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    </button>
    <button class="nav-btn" data-tip="Settings" onclick="setActiveNav(this)">
      <!-- settings icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </nav>

  <!-- Dark mode toggle at bottom -->
  <button class="nav-btn theme-btn" data-tip="Toggle Theme" onclick="toggleDarkMode()" id="themeBtn">
    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</aside>

<!-- ═══════════════════════ MAIN ═══════════════════════ -->
<main class="main-content">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search tasks…" oninput="renderBoard()" />
      </div>
    </div>
    <div class="topbar-right">
      <div class="filter-tabs" id="filterTabs">
        <button class="ftab active" data-filter="all" onclick="setFilter(this,'all')">All</button>
        <button class="ftab" data-filter="Pending" onclick="setFilter(this,'Pending')">Pending</button>
        <button class="ftab" data-filter="In Progress" onclick="setFilter(this,'In Progress')">In Progress</button>
        <button class="ftab" data-filter="Completed" onclick="setFilter(this,'Completed')">Completed</button>
      </div>
      <button class="btn-create" onclick="openModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Create Task
      </button>
      <div class="user-pill">
        <div class="user-avatar">TF</div>
        <span>Team</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
  </header>

  <!-- PAGE BODY -->
  <div class="page-body">

    <!-- KANBAN BOARD -->
    <section class="board-section">
      <div class="board-header">
        <h1 class="page-title">Tasks</h1>
      </div>
      <div class="kanban-board" id="kanbanBoard">
        <!-- Rendered by JS -->
      </div>
    </section>

    <!-- RIGHT PANEL -->
    <aside class="right-panel">

      <!-- Selected team -->
      <div class="panel-card team-card">
        <div class="team-label-sm">SELECTED</div>
        <div class="team-row">
          <strong class="team-name">Team Tasks</strong>
          <div class="team-icon-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
        </div>
      </div>

      <!-- Donut / completion ring -->
      <div class="panel-card donut-card">
        <svg class="donut-svg" viewBox="0 0 120 120">
          <circle class="donut-track" cx="60" cy="60" r="46"/>
          <circle class="donut-prog" id="donutFill" cx="60" cy="60" r="46"
            stroke-dasharray="0 289" stroke-dashoffset="72.25"/>
        </svg>
        <div class="donut-center">
          <span class="donut-pct" id="donutLabel">0%</span>
        </div>
      </div>

      <!-- Stats grid -->
      <div class="panel-card stats-card">
        <p class="panel-section-title">Tasks</p>
        <div class="stats-grid">
          <div class="stat-box total-box">
            <div class="stat-label">TOTAL</div>
            <div class="stat-value" id="statTotal">0</div>
          </div>
          <div class="stat-box done-box">
            <div class="stat-label">COMPLETED</div>
            <div class="stat-value" id="statCompleted">0</div>
          </div>
          <div class="stat-box prog-box">
            <div class="stat-label">IN PROGRESS</div>
            <div class="stat-value" id="statInProgress">0</div>
          </div>
          <div class="stat-box pend-box">
            <div class="stat-label">PENDING</div>
            <div class="stat-value" id="statPending">0</div>
          </div>
        </div>
      </div>

      <!-- Members -->
      <div class="panel-card members-card">
        <p class="panel-section-title">Team Members</p>
        <ul class="members-list" id="membersList"></ul>
      </div>

    </aside>
  </div>
</main>

<!-- ═══════════════════════ ADD / EDIT MODAL ═══════════════════════ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">Create New Task</h2>
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="taskId" />

      <div class="form-group">
        <label class="form-label">Task Title <span class="req">*</span></label>
        <input type="text" id="taskTitle" class="form-input" placeholder="e.g. Design landing page…" />
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="taskDesc" class="form-input form-textarea" placeholder="Brief description of the task…" rows="3"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Assigned To <span class="req">*</span></label>
          <input type="text" id="taskAssignee" class="form-input" placeholder="Team member name…" />
        </div>
        <div class="form-group">
          <label class="form-label">Due Date</label>
          <input type="date" id="taskDue" class="form-input" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select id="taskPriority" class="form-input form-select">
            <option value="Low">🟢 Low</option>
            <option value="Medium" selected>🟡 Medium</option>
            <option value="High">🔴 High</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select id="taskStatus" class="form-input form-select">
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
          </select>
        </div>
      </div>

      <div class="form-error" id="formError"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveTask()"><span id="saveLabel">Create Task</span></button>
    </div>
  </div>
</div>

<!-- ═══════════════════════ DELETE CONFIRM ═══════════════════════ -->
<div class="modal-overlay" id="deleteOverlay" onclick="closeDeleteOutside(event)">
  <div class="modal modal-sm" id="deleteModal">
    <div class="modal-header">
      <h2 class="modal-title">Delete Task</h2>
      <button class="modal-close" onclick="closeDelete()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <p class="delete-msg">Are you sure you want to permanently delete <strong id="deleteTaskName"></strong>?</p>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeDelete()">Cancel</button>
      <button class="btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
